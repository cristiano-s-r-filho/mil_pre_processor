# =============================================================================
# MIL Pipeline - Configuracao
# =============================================================================
# Este arquivo contem todas as constantes e caminhos usados pelo projeto.
# Copie para config.local.yaml e ajuste conforme necessario.
# O config.local.yaml tem prioridade sobre este arquivo.
# =============================================================================

# --- Caminhos (ajuste para cada maquina) ---
# Usa caminhos relativos ao project_root.
# Crie config.local.yaml para sobrescrever com caminhos absolutos se necessario.
paths:
  project_root: "."
  dataset_root: "./dataset"
  dados_processados_root: "./dados_processados"
  dados_para_patching_root: "./dados_para_patching"

# --- Alelos validos ---
alelos_validos:
  - "0alelos"
  - "1alelo"
  - "2alelos"

# --- Leitura de imagem (slide_reader) ---
reader:
  thumbnail_size: 1024
  pil_max_image_pixels: 500000000

# --- Classificacao de stain (phase1) ---
stain_classifier:
  fundo_saturacao_min: 20
  magenta_hue_min: 145
  magenta_hue_max: 175

# --- Deteccao de tecido (phase2) ---
tissue_detector:
  area_min_px: 500
  edge_margin: 0           # pixels no thumbnail (expande mascara)
  edge_mode: "exact"       # "exact" | "outside" | "inside"

# --- Builder (phase3) ---
builder:
  padrao_saida_final: "ID{patient}_{image}_{stain}_{status}.tif"

# --- Cropper (phase4) ---
cropper:
  s0_pattern: "^ID(?P<patient>\\d+)_(?P<image>\\d+)_(?P<stain>HE|PAS)_S0\\.tif$"
  n0_pattern: "^ID(?P<patient>\\d+)_(?P<image>\\d+)_(?P<stain>HE|PAS)_N0\\.tif$"
  feather_radius: 0        # DESATIVADO para teste de margem
  edge_margin: 0           # pixels no espaco original
  edge_mode: "exact"       # "exact" | "outside" | "inside"

# --- Renamer (phase5) ---
renamer:
  sd_pattern: "^ID(?P<patient>\\d+)_(?P<image>\\d+)_(?P<stain>HE|PAS)_SD_(?P<section>\\d+)\\.tif$"
  nd_pattern: "^ID(?P<patient>\\d+)_(?P<image>\\d+)_(?P<stain>HE|PAS)_ND\\.tif$"
  output_pattern: "ID{patient}_{image}_{section}.tif"

# --- Runtime Logging ---
runtime_log:
  enabled: true            # Habilitar logs de runtime
  dir: "_runtime_logs"     # Diretorio para logs de runtime

# --- Relatórios ---
reports:
  dir: "_reports"          # Diretório para relatórios detalhados
  generate_full: true      # Gerar relatório completo
  generate_balance: true   # Gerar relatório de balanceamento
  generate_corruption: true # Gerar relatório de corrupção
  generate_patients: true  # Gerar relatório por paciente
